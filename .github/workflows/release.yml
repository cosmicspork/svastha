name: release

on:
  push:
    branches: [main]
  # Manual PWA redeploy from current main, for when deploy-pwa failed on a
  # release and a rerun would only replay the broken snapshot.
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # Opens/updates a release PR from the conventional-commit history; merging it
  # tags the release, cuts the GitHub release, and sets release_created=true.
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      version: ${{ steps.rp.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please stamps the new version into the workspace Cargo.tomls
      # (via extra-files) but can't touch Cargo.lock, so the release PR opens
      # with a stale lockfile until someone pushes a manual refresh — this bit
      # the v0.1.0 release PR (CI failed on the version mismatch). The refresh
      # has to happen here, in this job, right after the action runs: a
      # separate workflow watching pushes to the release branch would never
      # fire, since pushes made with GITHUB_TOKEN (release-please-action's
      # commits included) don't trigger other workflows.
      - name: Check out the release PR branch
        if: steps.rp.outputs.prs_created == 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ fromJson(steps.rp.outputs.pr).headBranchName }}

      - name: Install Rust
        if: steps.rp.outputs.prs_created == 'true'
        run: rustup toolchain install stable --profile minimal

      # Re-resolves only the workspace-member versions release-please just
      # bumped; third-party dependency versions are left alone.
      - name: Refresh Cargo.lock
        if: steps.rp.outputs.prs_created == 'true'
        run: cargo update --workspace

      # Committed and pushed as github-actions[bot] with GITHUB_TOKEN, same as
      # release-please-action's own commits — so this can't loop: the push
      # won't trigger this workflow, and a re-run finds a clean lockfile and
      # skips the commit.
      - name: Commit and push the refreshed lockfile
        if: steps.rp.outputs.prs_created == 'true'
        run: |
          if [ -n "$(git status --porcelain Cargo.lock)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add Cargo.lock
            git commit -m "chore: refresh Cargo.lock for release"
            git push origin HEAD:${{ fromJson(steps.rp.outputs.pr).headBranchName }}
          fi

  # Runs only when a release was actually cut (same workflow run, so it isn't
  # blocked by the GITHUB_TOKEN "don't trigger workflows" rule). Publishes the
  # six crates to crates.io and the wasm SDK to npm as @svastha/core.
  # Also dispatchable: versions come from the Cargo.tomls on main (not the
  # release output), and the already-uploaded skip makes re-runs safe.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    # npm publishes via trusted publishing (OIDC): the workflow identity is the
    # credential, so no npm token exists to leak. id-token lets the runner mint
    # the OIDC token; job-level permissions override the workflow block, so
    # contents: read must be restated.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      # Dependency order: core first; the rest depend only on core. Modern cargo
      # waits for each crate to appear in the index before returning.
      # Already-uploaded versions are skipped, so a run that dies mid-loop
      # (crates.io rate limits new crates in bursts) can be re-dispatched and
      # picks up where it left off instead of failing on the first crate.
      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          for crate in svastha-core svastha-import svastha svastha-wasm svastha-relay svastha-node; do
            echo "publishing $crate"
            if ! output=$(cargo publish -p "$crate" 2>&1); then
              if grep -qE "already (uploaded|exists)" <<<"$output"; then
                echo "$crate: this version is already on crates.io — skipping"
              else
                echo "$output"
                exit 1
              fi
            fi
          done

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: v0.13.1

      - name: Build the npm SDK (@svastha/core)
        run: |
          wasm-pack build crates/wasm --target bundler --scope svastha
          version=$(jq -r '."."' .release-please-manifest.json)
          jq --arg v "$version" '.name = "@svastha/core" | .version = $v' \
            crates/wasm/pkg/package.json > crates/wasm/pkg/package.json.tmp
          mv crates/wasm/pkg/package.json.tmp crates/wasm/pkg/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      # Trusted publishing needs npm >= 11.5.1; the runner's bundled npm may lag.
      - name: Update npm
        run: npm install -g npm@latest

      # No token: npm detects the Actions OIDC context and authenticates as the
      # trusted publisher configured in the package's npmjs.com settings.
      # Provenance attestations are generated automatically.
      - name: Publish to npm
        run: cd crates/wasm/pkg && npm publish --access public

  # Builds and pushes the relay image. Downstream deploy config watches GHCR
  # for new tags; it doesn't live in this repo.
  image:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # Runner and deploy target are both amd64, so a single-platform build is enough.
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/cosmicspork/svastha-relay:${{ needs.release-please.outputs.version }}
            ghcr.io/cosmicspork/svastha-relay:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Builds and deploys the PWA. Cut from the same release as the relay image,
  # so the trust-contract version embedded in each always matches the other.
  deploy-pwa:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2

      - uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: v0.13.1

      - uses: oven-sh/setup-bun@v2

      - name: Build the PWA
        run: |
          cd web
          bun install --frozen-lockfile
          bun run build

      - uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: web
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
